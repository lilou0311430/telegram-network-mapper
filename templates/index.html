<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Network Mapper</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #232734;
            --border: #2e3345;
            --text: #e4e6ef;
            --text-dim: #8b8fa3;
            --accent: #6c8cff;
            --accent-hover: #8ba3ff;
            --green: #4ade80;
            --orange: #fb923c;
            --red: #f87171;
            --cyan: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        .app {
            display: grid;
            grid-template-columns: 360px 1fr;
            grid-template-rows: 56px 1fr;
            height: 100vh;
        }

        /* Header */
        header {
            grid-column: 1 / -1;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
        }

        header h1 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header h1 span { font-size: 20px; }

        .header-stats {
            display: flex;
            gap: 20px;
            margin-left: auto;
            font-size: 13px;
            color: var(--text-dim);
        }

        .header-stats .stat-value {
            color: var(--accent);
            font-weight: 600;
        }

        /* Sidebar */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
        }

        .panel-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* Form elements */
        label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 4px;
            margin-top: 10px;
        }

        label:first-of-type { margin-top: 0; }

        textarea, input, select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus, input:focus, select:focus {
            border-color: var(--accent);
        }

        textarea { resize: vertical; min-height: 70px; }

        .row {
            display: flex;
            gap: 8px;
        }

        .row > * { flex: 1; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            width: 100%;
            margin-top: 12px;
        }

        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-danger {
            background: var(--red);
            color: #fff;
            width: 100%;
            margin-top: 8px;
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 11px;
            background: var(--surface);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn-small:hover { background: var(--surface2); color: var(--text); }

        .export-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* Status */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .status-dot.running { background: var(--green); animation: pulse 1.5s infinite; }
        .status-dot.completed { background: var(--green); }
        .status-dot.error { background: var(--red); }
        .status-dot.stopped { background: var(--orange); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
        }

        .crawl-log {
            max-height: 120px;
            overflow-y: auto;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-dim);
            margin-top: 8px;
            line-height: 1.6;
        }

        .crawl-log .error { color: var(--red); }
        .crawl-log .info { color: var(--cyan); }

        /* Node info panel */
        .node-info {
            display: none;
        }

        .node-info.visible { display: block; }

        .node-info-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .node-info-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .node-info-name {
            font-weight: 600;
            font-size: 14px;
        }

        .node-info-username {
            font-size: 12px;
            color: var(--accent);
        }

        .node-info-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 8px;
            font-size: 12px;
        }

        .meta-item {
            background: var(--bg);
            padding: 6px 8px;
            border-radius: 4px;
        }

        .meta-label { color: var(--text-dim); font-size: 10px; }
        .meta-value { font-weight: 600; }

        /* Graph area */
        .graph-container {
            position: relative;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .link {
            stroke-opacity: 0.4;
            fill: none;
        }

        .link:hover {
            stroke-opacity: 0.8;
        }

        .node circle {
            stroke-width: 2;
            cursor: pointer;
            transition: r 0.2s;
        }

        .node:hover circle {
            filter: brightness(1.3);
        }

        .node text {
            font-size: 10px;
            fill: var(--text-dim);
            pointer-events: none;
            text-anchor: middle;
        }

        .node.highlighted circle {
            stroke: #fff;
            stroke-width: 3;
        }

        .node.dimmed {
            opacity: 0.15;
        }

        .link.dimmed {
            opacity: 0.05;
        }

        .tooltip {
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 100;
            max-width: 250px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .tooltip .tt-title { font-weight: 600; margin-bottom: 4px; }
        .tooltip .tt-subs { color: var(--accent); font-size: 11px; }
        .tooltip .tt-desc { color: var(--text-dim); font-size: 11px; margin-top: 4px; }

        /* Graph controls */
        .graph-controls {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 6px;
        }

        .graph-controls button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .graph-controls button:hover {
            background: var(--surface2);
        }

        /* Legend */
        .legend {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 11px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .legend-item:last-child { margin-bottom: 0; }

        .legend-color {
            width: 12px;
            height: 3px;
            border-radius: 2px;
        }

        /* Help tooltips */
        .help-tip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--border);
            color: var(--text-dim);
            font-size: 9px;
            font-weight: 700;
            cursor: help;
            margin-left: 4px;
            position: relative;
            vertical-align: middle;
        }

        .help-tip:hover {
            background: var(--accent);
            color: #fff;
        }

        .help-tip .help-text {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 11px;
            font-weight: 400;
            color: var(--text);
            white-space: normal;
            width: 220px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            z-index: 200;
            line-height: 1.4;
            text-transform: none;
            letter-spacing: 0;
        }

        .help-tip:hover .help-text {
            display: block;
        }

        /* Checkbox styling */
        input[type="checkbox"] {
            width: auto;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Telethon config */
        .telethon-config {
            display: none;
        }

        .telethon-config.visible { display: block; }

        /* Search in graph */
        .search-bar {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .search-bar input {
            border: none;
            background: transparent;
            width: 200px;
            padding: 6px 10px;
            font-size: 12px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header>
            <h1><span>&#128752;</span> Telegram Network Mapper</h1>
            <div class="header-stats">
                <span>Noeuds: <span class="stat-value" id="stat-nodes">0</span></span>
                <span>Liens: <span class="stat-value" id="stat-edges">0</span></span>
                <span>Profondeur: <span class="stat-value" id="stat-depth">0</span></span>
                <span>Vitesse: <span class="stat-value" id="stat-speed">-</span> ch/min</span>
            </div>
        </header>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Crawl config -->
            <div class="panel">
                <div class="panel-title">Configuration du crawl</div>

                <label>Chaines seed <span class="help-tip">?<span class="help-text">Les chaines de depart du crawl. Entre un @username, un lien t.me ou juste le nom, un par ligne.</span></span></label>
                <textarea id="seeds" placeholder="@channel_name&#10;https://t.me/another_channel&#10;third_channel"></textarea>

                <div class="row">
                    <div>
                        <label>Profondeur max <span class="help-tip">?<span class="help-text">Nombre de niveaux de liens a explorer. 1 = seulement les liens directs, 2 = liens des liens, etc. Plus c'est haut, plus le reseau sera grand.</span></span></label>
                        <input type="number" id="max-depth" value="2" min="0" max="10">
                    </div>
                    <div>
                        <label>Max chaines <span class="help-tip">?<span class="help-text">Nombre maximum de chaines a scraper au total. 0 = illimite (attention au temps de crawl). Limite le crawl pour eviter qu'il tourne trop longtemps.</span></span></label>
                        <input type="number" id="max-channels" value="50" min="0" max="10000">
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label>Messages/chaine <span class="help-tip">?<span class="help-text">Nombre de messages recents a analyser par chaine. Plus il y en a, plus on trouve de liens, mais le scraping est plus lent.</span></span></label>
                        <input type="number" id="max-messages" value="100" min="10" max="5000">
                    </div>
                    <div>
                        <label>Delai (sec) <span class="help-tip">?<span class="help-text">Temps d'attente entre chaque requete. Un delai plus long evite de se faire bloquer par Telegram, mais ralentit le crawl.</span></span></label>
                        <input type="number" id="delay" value="0.8" min="0.2" max="10" step="0.1">
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label>Requetes paralleles <span class="help-tip">?<span class="help-text">Nombre de chaines scrapees en meme temps. Plus = plus rapide, mais augmente le risque de blocage par Telegram.</span></span></label>
                        <input type="number" id="concurrency" value="5" min="1" max="15">
                    </div>
                    <div>
                        <label>&nbsp;</label>
                        <div style="font-size:10px;color:var(--text-dim);padding-top:4px">
                            Plus = plus rapide mais risque de blocage
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label>Periode (jours) <span class="help-tip">?<span class="help-text">N'analyser que les messages des X derniers jours. 0 = pas de filtre, tous les messages sont analyses.</span></span></label>
                        <input type="number" id="max-age-days" value="0" min="0" max="3650">
                    </div>
                    <div>
                        <label>Abonnes min <span class="help-tip">?<span class="help-text">Ignorer les chaines avec moins de N abonnes. Utile pour filtrer les micro-chaines sans interet. 0 = pas de filtre. Les seeds sont toujours analyses.</span></span></label>
                        <input type="number" id="min-subscribers" value="0" min="0">
                    </div>
                </div>

                <label>Canaux a ignorer <span class="help-tip">?<span class="help-text">Liste de @usernames a ne jamais explorer, un par ligne. Utile pour exclure des canaux spam, bots, ou hors-sujet.</span></span></label>
                <textarea id="blacklist" placeholder="@spam_channel&#10;@bot_channel" style="min-height: 45px;"></textarea>

                <label>Types de liens <span class="help-tip">?<span class="help-text">Choisir quels types de liens detecter. Decocher un type pour l'ignorer dans l'analyse.</span></span></label>
                <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; font-size: 12px;">
                    <label style="display: flex; align-items: center; gap: 4px; margin: 0; cursor: pointer;">
                        <input type="checkbox" id="lt-forward" checked> Forwards
                    </label>
                    <label style="display: flex; align-items: center; gap: 4px; margin: 0; cursor: pointer;">
                        <input type="checkbox" id="lt-mention" checked> Mentions
                    </label>
                    <label style="display: flex; align-items: center; gap: 4px; margin: 0; cursor: pointer;">
                        <input type="checkbox" id="lt-link" checked> Liens t.me
                    </label>
                    <label style="display: flex; align-items: center; gap: 4px; margin: 0; cursor: pointer;">
                        <input type="checkbox" id="lt-description" checked> Description
                    </label>
                </div>

                <label>Methode <span class="help-tip">?<span class="help-text">Web scraping : pas besoin de compte, mais limite aux chaines publiques. Telethon API : necessite un compte Telegram, mais plus complet et fiable.</span></span></label>
                <select id="method" onchange="toggleTelethon()">
                    <option value="web">Web scraping (sans compte)</option>
                    <option value="telethon">Telethon API (avec compte)</option>
                </select>

                <div class="telethon-config" id="telethon-config">
                    <label>API ID</label>
                    <input type="text" id="api-id" placeholder="12345678">
                    <label>API Hash</label>
                    <input type="text" id="api-hash" placeholder="abc123...">
                    <label>Telephone</label>
                    <input type="text" id="phone" placeholder="+33612345678">
                </div>

                <button class="btn btn-primary" id="btn-start" onclick="startCrawl()">
                    Lancer le crawl
                </button>
                <button class="btn btn-danger" id="btn-stop" style="display:none" onclick="stopCrawl()">
                    Arreter
                </button>
            </div>

            <!-- Status -->
            <div class="panel" id="status-panel">
                <div class="panel-title">Statut</div>
                <div class="status-bar">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">En attente</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
                </div>
                <div class="crawl-log" id="crawl-log"></div>
            </div>

            <!-- Export -->
            <div class="panel">
                <div class="panel-title">Export</div>
                <div class="export-buttons">
                    <button class="btn btn-small" onclick="exportData('gexf')">GEXF (Gephi)</button>
                    <button class="btn btn-small" onclick="exportData('graphml')">GraphML</button>
                    <button class="btn btn-small" onclick="exportData('json')">JSON</button>
                </div>
            </div>

            <!-- Node info -->
            <div class="panel node-info" id="node-info">
                <div class="panel-title">Info du noeud</div>
                <div class="node-info-header">
                    <div class="node-info-avatar" id="ni-avatar">?</div>
                    <div>
                        <div class="node-info-name" id="ni-name"></div>
                        <div class="node-info-username" id="ni-username"></div>
                    </div>
                </div>
                <div class="node-info-meta">
                    <div class="meta-item">
                        <div class="meta-label">Abonnes</div>
                        <div class="meta-value" id="ni-subs">-</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">Connexions</div>
                        <div class="meta-value" id="ni-connections">-</div>
                    </div>
                </div>
                <div id="ni-desc" style="font-size: 12px; color: var(--text-dim); margin-top: 8px;"></div>
                <a id="ni-link" href="#" target="_blank" style="font-size: 12px; color: var(--accent); margin-top: 6px; display: block;">
                    Ouvrir sur Telegram
                </a>
            </div>
        </div>

        <!-- Graph -->
        <div class="graph-container" id="graph-container">
            <svg id="graph-svg"></svg>

            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Rechercher un noeud..." oninput="searchNode(this.value)">
            </div>

            <div class="graph-controls">
                <button onclick="zoomIn()" title="Zoom +">+</button>
                <button onclick="zoomOut()" title="Zoom -">-</button>
                <button onclick="resetZoom()" title="Recentrer">&#8634;</button>
                <button onclick="toggleLabels()" title="Labels">T</button>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--accent)"></div>
                    <span>Chaine scrapee</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--text-dim)"></div>
                    <span>Chaine decouverte (non scrapee)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--orange); height: 2px;"></div>
                    <span>Forward</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--cyan); height: 2px;"></div>
                    <span>Mention / Lien</span>
                </div>
            </div>

            <div class="tooltip" id="tooltip"></div>
        </div>
    </div>

    <script>
    // ─── State ───────────────────────────────────────────
    let simulation = null;
    let graphData = { nodes: [], links: [] };
    let showLabels = true;
    let pollInterval = null;
    let svg, g, linkGroup, nodeGroup, zoom;

    // ─── Init ────────────────────────────────────────────
    function initGraph() {
        const container = document.getElementById('graph-container');
        svg = d3.select('#graph-svg');

        zoom = d3.zoom()
            .scaleExtent([0.1, 8])
            .on('zoom', (event) => {
                g.attr('transform', event.transform);
            });

        svg.call(zoom);

        g = svg.append('g');

        // Arrow markers
        svg.append('defs').selectAll('marker')
            .data(['forward', 'mention'])
            .enter().append('marker')
            .attr('id', d => `arrow-${d}`)
            .attr('viewBox', '0 -5 10 10')
            .attr('refX', 20)
            .attr('refY', 0)
            .attr('markerWidth', 6)
            .attr('markerHeight', 6)
            .attr('orient', 'auto')
            .append('path')
            .attr('d', 'M0,-5L10,0L0,5')
            .attr('fill', d => d === 'forward' ? 'var(--orange)' : 'var(--cyan)');

        linkGroup = g.append('g').attr('class', 'links');
        nodeGroup = g.append('g').attr('class', 'nodes');
    }

    function updateGraph(data) {
        if (!data || !data.nodes) return;
        graphData = data;

        // Update header stats
        document.getElementById('stat-nodes').textContent = data.nodes.length;
        document.getElementById('stat-edges').textContent = data.links.length;

        // Build node map for quick lookup
        const nodeMap = new Map(data.nodes.map(n => [n.id, n]));

        // Size scale based on subscribers
        const maxSubs = Math.max(1, ...data.nodes.map(n => n.subscribers || 1));
        const sizeScale = d3.scaleSqrt().domain([0, maxSubs]).range([5, 25]);

        // Edge weight scale
        const maxWeight = Math.max(1, ...data.links.map(l => l.weight || 1));
        const widthScale = d3.scaleLinear().domain([1, maxWeight]).range([1, 5]);

        // ── Links ──
        const links = linkGroup.selectAll('.link')
            .data(data.links, d => `${d.source.id || d.source}-${d.target.id || d.target}`);

        links.exit().remove();

        const linksEnter = links.enter().append('line')
            .attr('class', 'link');

        const allLinks = linksEnter.merge(links)
            .attr('stroke', d => {
                const types = d.types || [];
                return types.includes('forward') ? 'var(--orange)' : 'var(--cyan)';
            })
            .attr('stroke-width', d => widthScale(d.weight || 1))
            .attr('marker-end', d => {
                const types = d.types || [];
                return types.includes('forward') ? 'url(#arrow-forward)' : 'url(#arrow-mention)';
            });

        // ── Nodes ──
        const nodes = nodeGroup.selectAll('.node')
            .data(data.nodes, d => d.id);

        nodes.exit().remove();

        const nodesEnter = nodes.enter().append('g')
            .attr('class', 'node')
            .call(d3.drag()
                .on('start', dragStarted)
                .on('drag', dragged)
                .on('end', dragEnded))
            .on('click', (event, d) => showNodeInfo(d))
            .on('mouseenter', (event, d) => highlightConnected(d))
            .on('mouseleave', () => clearHighlight());

        nodesEnter.append('circle');
        nodesEnter.append('text').attr('dy', '0.35em');

        const allNodes = nodesEnter.merge(nodes);

        allNodes.select('circle')
            .attr('r', d => sizeScale(d.subscribers || 1))
            .attr('fill', d => d.scraped ? 'var(--accent)' : 'var(--surface2)')
            .attr('stroke', d => d.scraped ? 'rgba(108,140,255,0.3)' : 'var(--border)');

        allNodes.select('text')
            .text(d => showLabels ? (d.title || d.id).substring(0, 20) : '')
            .attr('y', d => sizeScale(d.subscribers || 1) + 12);

        // ── Simulation ──
        if (simulation) simulation.stop();

        simulation = d3.forceSimulation(data.nodes)
            .force('link', d3.forceLink(data.links).id(d => d.id).distance(80))
            .force('charge', d3.forceManyBody().strength(-200))
            .force('center', d3.forceCenter(
                document.getElementById('graph-container').clientWidth / 2,
                document.getElementById('graph-container').clientHeight / 2
            ))
            .force('collision', d3.forceCollide().radius(d => sizeScale(d.subscribers || 1) + 5))
            .on('tick', () => {
                allLinks
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                allNodes.attr('transform', d => `translate(${d.x},${d.y})`);
            });
    }

    // ─── Interactions ────────────────────────────────────
    function highlightConnected(d) {
        const connected = new Set();
        connected.add(d.id);
        graphData.links.forEach(l => {
            const src = l.source.id || l.source;
            const tgt = l.target.id || l.target;
            if (src === d.id) connected.add(tgt);
            if (tgt === d.id) connected.add(src);
        });

        nodeGroup.selectAll('.node')
            .classed('dimmed', n => !connected.has(n.id))
            .classed('highlighted', n => n.id === d.id);

        linkGroup.selectAll('.link')
            .classed('dimmed', l => {
                const src = l.source.id || l.source;
                const tgt = l.target.id || l.target;
                return src !== d.id && tgt !== d.id;
            });
    }

    function clearHighlight() {
        nodeGroup.selectAll('.node').classed('dimmed', false).classed('highlighted', false);
        linkGroup.selectAll('.link').classed('dimmed', false);
    }

    function showNodeInfo(d) {
        const panel = document.getElementById('node-info');
        panel.classList.add('visible');

        document.getElementById('ni-avatar').textContent = (d.title || d.id)[0].toUpperCase();
        document.getElementById('ni-name').textContent = d.title || d.id;
        document.getElementById('ni-username').textContent = '@' + d.id;
        document.getElementById('ni-subs').textContent = d.subscribers ? d.subscribers.toLocaleString('fr-FR') : '-';
        document.getElementById('ni-desc').textContent = d.description || '';
        document.getElementById('ni-link').href = `https://t.me/${d.id}`;

        // Count connections
        let conns = 0;
        graphData.links.forEach(l => {
            const src = l.source.id || l.source;
            const tgt = l.target.id || l.target;
            if (src === d.id || tgt === d.id) conns++;
        });
        document.getElementById('ni-connections').textContent = conns;
    }

    function searchNode(query) {
        if (!query) {
            clearHighlight();
            return;
        }
        query = query.toLowerCase();
        const found = graphData.nodes.find(n =>
            n.id.includes(query) || (n.title && n.title.toLowerCase().includes(query))
        );
        if (found) {
            highlightConnected(found);
            // Pan to node
            const transform = d3.zoomIdentity.translate(
                document.getElementById('graph-container').clientWidth / 2 - found.x,
                document.getElementById('graph-container').clientHeight / 2 - found.y
            );
            svg.transition().duration(500).call(zoom.transform, transform);
        }
    }

    // ─── Drag ────────────────────────────────────────────
    function dragStarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
    }

    function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
    }

    function dragEnded(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
    }

    // ─── Controls ────────────────────────────────────────
    function zoomIn() {
        svg.transition().duration(300).call(zoom.scaleBy, 1.5);
    }

    function zoomOut() {
        svg.transition().duration(300).call(zoom.scaleBy, 0.67);
    }

    function resetZoom() {
        svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
    }

    function toggleLabels() {
        showLabels = !showLabels;
        nodeGroup.selectAll('.node text')
            .text(d => showLabels ? (d.title || d.id).substring(0, 20) : '');
    }

    function toggleTelethon() {
        const method = document.getElementById('method').value;
        document.getElementById('telethon-config').classList.toggle('visible', method === 'telethon');
    }

    // ─── Crawl API ───────────────────────────────────────
    async function startCrawl() {
        const seeds = document.getElementById('seeds').value
            .split('\n')
            .map(s => s.trim())
            .filter(s => s.length > 0);

        if (seeds.length === 0) {
            alert('Ajoute au moins une chaine seed !');
            return;
        }

        // Collect link types
        const linkTypes = [];
        if (document.getElementById('lt-forward').checked) linkTypes.push('forward');
        if (document.getElementById('lt-mention').checked) linkTypes.push('mention');
        if (document.getElementById('lt-link').checked) linkTypes.push('link');
        if (document.getElementById('lt-description').checked) linkTypes.push('description');

        // Collect blacklist
        const blacklist = document.getElementById('blacklist').value
            .split('\n')
            .map(s => s.trim())
            .filter(s => s.length > 0);

        const body = {
            seeds: seeds,
            max_depth: parseInt(document.getElementById('max-depth').value),
            max_channels: parseInt(document.getElementById('max-channels').value),
            max_messages: parseInt(document.getElementById('max-messages').value),
            delay: parseFloat(document.getElementById('delay').value),
            concurrency: parseInt(document.getElementById('concurrency').value),
            method: document.getElementById('method').value,
            max_age_days: parseInt(document.getElementById('max-age-days').value) || 0,
            min_subscribers: parseInt(document.getElementById('min-subscribers').value) || 0,
            blacklist: blacklist,
            link_types: linkTypes,
        };

        if (body.method === 'telethon') {
            body.api_id = document.getElementById('api-id').value;
            body.api_hash = document.getElementById('api-hash').value;
            body.phone = document.getElementById('phone').value;
        }

        try {
            const resp = await fetch('/api/crawl/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            const data = await resp.json();

            if (resp.ok) {
                document.getElementById('btn-start').style.display = 'none';
                document.getElementById('btn-stop').style.display = 'block';
                document.getElementById('crawl-log').innerHTML = '';
                startPolling();
                addLog('info', `Crawl lance avec ${data.seeds.length} seed(s), profondeur ${data.max_depth}`);
            } else {
                alert(data.error || 'Erreur');
            }
        } catch (e) {
            alert('Erreur de connexion au serveur: ' + e.message);
        }
    }

    async function stopCrawl() {
        await fetch('/api/crawl/stop', { method: 'POST' });
        addLog('info', 'Arret demande...');
    }

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(async () => {
            try {
                // Fetch status only (lightweight, no graph data)
                const statusResp = await fetch('/api/crawl/status');
                const status = await statusResp.json();
                updateStatus(status);

                if (status.status !== 'running') {
                    clearInterval(pollInterval);
                    pollInterval = null;
                    document.getElementById('btn-start').style.display = 'block';
                    document.getElementById('btn-stop').style.display = 'none';

                    // Crawl finished → load and render graph once
                    addLog('info', 'Chargement du graphe...');
                    const graphResp = await fetch('/api/graph');
                    const graph = await graphResp.json();
                    updateGraph(graph);
                    addLog('info', `Graphe charge: ${graph.nodes.length} noeuds, ${graph.links.length} liens`);
                }
            } catch (e) {
                console.error('Poll error:', e);
            }
        }, 1500);
    }

    function updateStatus(status) {
        const dot = document.getElementById('status-dot');
        dot.className = 'status-dot ' + (status.status || 'idle');

        const labels = {
            idle: 'En attente',
            running: `Scraping: @${status.current_channel} (prof. ${status.current_depth})`,
            completed: 'Termine !',
            stopped: 'Arrete',
            error: 'Erreur',
        };
        document.getElementById('status-text').textContent = labels[status.status] || status.status;
        document.getElementById('stat-depth').textContent = status.current_depth || 0;
        document.getElementById('stat-speed').textContent = status.speed > 0 ? status.speed : '-';

        // Progress
        if (status.channels_total > 0) {
            const pct = Math.round((status.channels_scraped / status.channels_total) * 100);
            document.getElementById('progress-fill').style.width = pct + '%';
        }

        // Errors
        if (status.errors && status.errors.length > 0) {
            const last = status.errors[status.errors.length - 1];
            addLog('error', last);
        }
    }

    function addLog(type, message) {
        const log = document.getElementById('crawl-log');
        const time = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        log.innerHTML += `<div class="${type}">[${time}] ${message}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    // ─── Export ───────────────────────────────────────────
    function exportData(format) {
        window.open(`/api/export/${format}`, '_blank');
    }

    // ─── Init ────────────────────────────────────────────
    async function loadConfig() {
        try {
            const resp = await fetch('/api/config');
            const cfg = await resp.json();
            if (cfg.api_id) document.getElementById('api-id').value = cfg.api_id;
            if (cfg.api_hash) document.getElementById('api-hash').value = cfg.api_hash;
            if (cfg.phone) document.getElementById('phone').value = cfg.phone;
        } catch (e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
        initGraph();
        loadConfig();
    });
    </script>
</body>
</html>
